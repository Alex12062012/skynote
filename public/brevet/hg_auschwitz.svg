<svg viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Fond ciel gris -->
  <rect width="480" height="300" fill="#c8c8c8"/>
  <!-- Sol -->
  <rect y="220" width="480" height="80" fill="#8b7355"/>
  <!-- Bâtiment principal — brique -->
  <rect x="140" y="80" width="200" height="140" fill="#8b4513" stroke="#5a2d0c" stroke-width="1.5"/>
  <!-- Briques horizontales -->
  <line x1="140" y1="100" x2="340" y2="100" stroke="#5a2d0c" stroke-width="0.8"/>
  <line x1="140" y1="120" x2="340" y2="120" stroke="#5a2d0c" stroke-width="0.8"/>
  <line x1="140" y1="140" x2="340" y2="140" stroke="#5a2d0c" stroke-width="0.8"/>
  <line x1="140" y1="160" x2="340" y2="160" stroke="#5a2d0c" stroke-width="0.8"/>
  <line x1="140" y1="180" x2="340" y2="180" stroke="#5a2d0c" stroke-width="0.8"/>
  <line x1="140" y1="200" x2="340" y2="200" stroke="#5a2d0c" stroke-width="0.8"/>
  <!-- Tour centrale -->
  <rect x="205" y="40" width="70" height="80" fill="#6b3410" stroke="#5a2d0c" stroke-width="1.5"/>
  <!-- Arche d'entrée -->
  <rect x="220" y="140" width="40" height="80" fill="#1a1a1a"/>
  <ellipse cx="240" cy="140" rx="20" ry="15" fill="#1a1a1a"/>
  <!-- Fenêtres -->
  <rect x="155" y="95" width="20" height="25" fill="#1a1a1a" rx="2"/>
  <rect x="185" y="95" width="20" height="25" fill="#1a1a1a" rx="2"/>
  <rect x="275" y="95" width="20" height="25" fill="#1a1a1a" rx="2"/>
  <rect x="305" y="95" width="20" height="25" fill="#1a1a1a" rx="2"/>
  <rect x="155" y="155" width="20" height="25" fill="#1a1a1a" rx="2"/>
  <rect x="305" y="155" width="20" height="25" fill="#1a1a1a" rx="2"/>
  <!-- Rails qui entrent dans l'arche -->
  <line x1="100" y1="270" x2="235" y2="220" stroke="#555" stroke-width="3"/>
  <line x1="380" y1="270" x2="245" y2="220" stroke="#555" stroke-width="3"/>
  <!-- Traverses -->
  <line x1="110" y1="268" x2="370" y2="268" stroke="#555" stroke-width="2"/>
  <line x1="125" y1="263" x2="355" y2="263" stroke="#555" stroke-width="2"/>
  <line x1="145" y1="255" x2="335" y2="255" stroke="#555" stroke-width="2"/>
  <line x1="175" y1="244" x2="305" y2="244" stroke="#555" stroke-width="2"/>
  <!-- Barbelés -->
  <line x1="0" y1="75" x2="140" y2="75" stroke="#888" stroke-width="1"/>
  <line x1="340" y1="75" x2="480" y2="75" stroke="#888" stroke-width="1"/>
  <!-- Poteau gauche -->
  <rect x="20" y="60" width="6" height="160" fill="#666"/>
  <rect x="70" y="60" width="6" height="160" fill="#666"/>
  <!-- Poteau droit -->
  <rect x="405" y="60" width="6" height="160" fill="#666"/>
  <rect x="455" y="60" width="6" height="160" fill="#666"/>
  <!-- Légende -->
  <rect x="0" y="275" width="480" height="25" fill="rgba(0,0,0,0.6)"/>
  <text x="240" y="291" fill="white" font-size="11" text-anchor="middle">Entrée principale du camp d'Auschwitz-Birkenau (reconstitution illustrative)</text>
</svg>
