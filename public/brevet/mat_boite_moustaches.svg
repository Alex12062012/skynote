<svg viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="13">
  <!-- Axe -->
  <line x1="30" y1="100" x2="380" y2="100" stroke="#374151" stroke-width="1.5"/>
  <!-- Graduations : min=5, max=19, échelle: 5→30, 19→370 → 1 unité = (370-30)/14 = 24.3 -->
  <!-- 5→30, 8→103, 9→127.5, 11→176, 12→200, 14→249, 15→273, 19→370 -->
  <!-- Graduation labels -->
  <text x="26" y="118" fill="#6b7280" text-anchor="middle">5</text>
  <text x="124" y="118" fill="#6b7280" text-anchor="middle">9</text>
  <text x="172" y="118" fill="#6b7280" text-anchor="middle">11</text>
  <text x="196" y="118" fill="#6b7280" text-anchor="middle">12</text>
  <text x="244" y="118" fill="#6b7280" text-anchor="middle">15</text>
  <text x="370" y="118" fill="#6b7280" text-anchor="middle">19</text>
  <!-- Ticks -->
  <line x1="26" y1="96" x2="26" y2="104" stroke="#374151" stroke-width="1"/>
  <line x1="124" y1="96" x2="124" y2="104" stroke="#374151" stroke-width="1"/>
  <line x1="196" y1="96" x2="196" y2="104" stroke="#374151" stroke-width="1"/>
  <line x1="244" y1="96" x2="244" y2="104" stroke="#374151" stroke-width="1"/>
  <line x1="370" y1="96" x2="370" y2="104" stroke="#374151" stroke-width="1"/>
  <!-- Moustache gauche : min(5) → Q1(9) -->
  <line x1="26" y1="100" x2="124" y2="100" stroke="#374151" stroke-width="2"/>
  <line x1="26" y1="88" x2="26" y2="112" stroke="#374151" stroke-width="2"/>
  <!-- Boîte Q1(9)→Q3(15) -->
  <rect x="124" y="70" width="120" height="60" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/>
  <!-- Médiane (12) -->
  <line x1="196" y1="70" x2="196" y2="130" stroke="#dc2626" stroke-width="3"/>
  <!-- Moustache droite : Q3(15) → max(19) -->
  <line x1="244" y1="100" x2="370" y2="100" stroke="#374151" stroke-width="2"/>
  <line x1="370" y1="88" x2="370" y2="112" stroke="#374151" stroke-width="2"/>
  <!-- Légendes -->
  <text x="124" y="58" fill="#2563eb" text-anchor="middle" font-size="11">Q₁=9</text>
  <text x="196" y="58" fill="#dc2626" text-anchor="middle" font-size="11">Méd.=12</text>
  <text x="244" y="58" fill="#2563eb" text-anchor="middle" font-size="11">Q₃=15</text>
  <text x="200" y="152" fill="#6b7280" text-anchor="middle" font-size="11">Boîte à moustaches — notes de 10 élèves (min=5, max=19)</text>
</svg>
