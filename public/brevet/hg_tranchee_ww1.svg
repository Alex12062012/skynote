<svg viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Ciel gris-brun (ambiance front) -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a8a6e"/>
      <stop offset="100%" stop-color="#9a9070"/>
    </linearGradient>
    <linearGradient id="terre" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b5a3e"/>
      <stop offset="100%" stop-color="#4a3c28"/>
    </linearGradient>
  </defs>
  <rect width="480" height="300" fill="url(#sky)"/>
  <!-- No man's land et barbelés en fond -->
  <rect y="130" width="480" height="30" fill="#7a6a4e"/>
  <!-- Barbelés -->
  <line x1="0" y1="135" x2="480" y2="135" stroke="#555" stroke-width="1.5"/>
  <line x1="0" y1="145" x2="480" y2="145" stroke="#555" stroke-width="1.5"/>
  <circle cx="60" cy="135" r="4" fill="none" stroke="#555" stroke-width="1"/>
  <circle cx="120" cy="145" r="4" fill="none" stroke="#555" stroke-width="1"/>
  <circle cx="200" cy="135" r="4" fill="none" stroke="#555" stroke-width="1"/>
  <circle cx="300" cy="145" r="4" fill="none" stroke="#555" stroke-width="1"/>
  <circle cx="380" cy="135" r="4" fill="none" stroke="#555" stroke-width="1"/>
  <!-- Terre avant-tranchée -->
  <path d="M0,155 Q120,140 240,158 Q360,172 480,155 L480,300 L0,300 Z" fill="#6b5a3e"/>
  <!-- La tranchée (creux) -->
  <path d="M0,195 Q60,188 120,195 Q180,202 240,195 Q300,188 360,195 Q420,202 480,195 L480,300 L0,300 Z" fill="url(#terre)"/>
  <!-- Parois en bois de la tranchée -->
  <rect x="0" y="195" width="480" height="8" fill="#5a4020"/>
  <!-- Sacs de sable (parapet) -->
  <ellipse cx="40" cy="160" rx="30" ry="12" fill="#8a7a5a"/>
  <ellipse cx="100" cy="157" rx="28" ry="11" fill="#7a6a4a"/>
  <ellipse cx="160" cy="162" rx="32" ry="12" fill="#8a7a5a"/>
  <ellipse cx="220" cy="158" rx="29" ry="11" fill="#7a6a4a"/>
  <ellipse cx="280" cy="161" rx="31" ry="12" fill="#8a7a5a"/>
  <ellipse cx="340" cy="157" rx="28" ry="11" fill="#7a6a4a"/>
  <ellipse cx="400" cy="162" rx="32" ry="12" fill="#8a7a5a"/>
  <ellipse cx="455" cy="158" rx="25" ry="11" fill="#7a6a4a"/>
  <!-- Soldats en silhouette dans la tranchée -->
  <!-- Soldat 1 -->
  <ellipse cx="80" cy="210" rx="10" ry="12" fill="#3a4a30"/>
  <circle cx="80" cy="196" r="8" fill="#3a4a30"/>
  <!-- Casque -->
  <ellipse cx="80" cy="192" rx="10" ry="5" fill="#2a3a20"/>
  <!-- Fusil -->
  <line x1="88" y1="200" x2="110" y2="185" stroke="#2a1a0a" stroke-width="3"/>
  <!-- Soldat 2 -->
  <ellipse cx="200" cy="212" rx="10" ry="12" fill="#3a4a30"/>
  <circle cx="200" cy="198" r="8" fill="#3a4a30"/>
  <ellipse cx="200" cy="194" rx="10" ry="5" fill="#2a3a20"/>
  <line x1="208" y1="202" x2="230" y2="187" stroke="#2a1a0a" stroke-width="3"/>
  <!-- Soldat 3 -->
  <ellipse cx="360" cy="210" rx="10" ry="12" fill="#3a4a30"/>
  <circle cx="360" cy="196" r="8" fill="#3a4a30"/>
  <ellipse cx="360" cy="192" rx="10" ry="5" fill="#2a3a20"/>
  <line x1="368" y1="200" x2="390" y2="185" stroke="#2a1a0a" stroke-width="3"/>
  <!-- Explosions en fond -->
  <circle cx="150" cy="110" r="18" fill="rgba(200,120,0,0.4)"/>
  <circle cx="380" cy="95" r="12" fill="rgba(200,120,0,0.3)"/>
  <!-- Légende -->
  <rect x="0" y="275" width="480" height="25" fill="rgba(0,0,0,0.6)"/>
  <text x="240" y="291" fill="white" font-size="11" text-anchor="middle">Soldats dans une tranchée, front de la Somme, 1916 (reconstitution illustrative)</text>
</svg>
