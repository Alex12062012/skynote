<svg viewBox="0 0 320 300" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <!-- Grille -->
  <defs><pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e5e7eb" stroke-width="0.5"/></pattern></defs>
  <rect width="320" height="300" fill="url(#grid)"/>
  <!-- Axes -->
  <line x1="20" y1="270" x2="300" y2="270" stroke="#374151" stroke-width="1.5"/>
  <line x1="20" y1="270" x2="20" y2="10" stroke="#374151" stroke-width="1.5"/>
  <!-- Flèches axes -->
  <polygon points="300,270 290,265 290,275" fill="#374151"/>
  <polygon points="20,10 15,20 25,20" fill="#374151"/>
  <!-- Labels axes -->
  <text x="305" y="274" fill="#374151">x</text>
  <text x="12" y="8" fill="#374151">y</text>
  <!-- Graduations x -->
  <text x="45" y="284" fill="#6b7280">1</text>
  <text x="75" y="284" fill="#6b7280">2</text>
  <text x="105" y="284" fill="#6b7280">3</text>
  <text x="135" y="284" fill="#6b7280">4</text>
  <text x="165" y="284" fill="#6b7280">5</text>
  <text x="195" y="284" fill="#6b7280">6</text>
  <text x="225" y="284" fill="#6b7280">7</text>
  <text x="255" y="284" fill="#6b7280">8</text>
  <!-- Graduations y -->
  <text x="5" y="244" fill="#6b7280">1</text>
  <text x="5" y="214" fill="#6b7280">2</text>
  <text x="5" y="184" fill="#6b7280">3</text>
  <text x="5" y="154" fill="#6b7280">4</text>
  <text x="5" y="124" fill="#6b7280">5</text>
  <text x="5" y="94" fill="#6b7280">6</text>
  <text x="5" y="64" fill="#6b7280">7</text>
  <text x="5" y="34" fill="#6b7280">8</text>
  <!-- Quadrilatère ABCD — coords: x*30+20, 270-y*30 -->
  <!-- A(1,4)→(50,150) B(5,1)→(170,240) C(8,5)→(260,120) D(4,8)→(140,30) -->
  <polygon points="50,150 170,240 260,120 140,30" fill="#dbeafe" fill-opacity="0.5" stroke="#2563eb" stroke-width="2"/>
  <!-- Diagonales en pointillés -->
  <line x1="50" y1="150" x2="260" y2="120" stroke="#9333ea" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="170" y1="240" x2="140" y2="30" stroke="#9333ea" stroke-width="1" stroke-dasharray="5,3"/>
  <!-- Points -->
  <circle cx="50" cy="150" r="4" fill="#2563eb"/>
  <circle cx="170" cy="240" r="4" fill="#2563eb"/>
  <circle cx="260" cy="120" r="4" fill="#2563eb"/>
  <circle cx="140" cy="30" r="4" fill="#2563eb"/>
  <!-- Labels points -->
  <text x="32" y="148" fill="#1e40af" font-weight="bold">A(1;4)</text>
  <text x="174" y="256" fill="#1e40af" font-weight="bold">B(5;1)</text>
  <text x="264" y="118" fill="#1e40af" font-weight="bold">C(8;5)</text>
  <text x="114" y="26" fill="#1e40af" font-weight="bold">D(4;8)</text>
</svg>
