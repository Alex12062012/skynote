<svg viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="14">
  <!-- Losange ABCD -->
  <polygon points="160,25 280,130 160,235 40,130" fill="#fef9c3" stroke="#b45309" stroke-width="2"/>
  <!-- Diagonales -->
  <line x1="160" y1="25" x2="160" y2="235" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="40" y1="130" x2="280" y2="130" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,3"/>
  <!-- Marqueur angle droit en O -->
  <rect x="160" y="130" width="12" height="12" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- Labels vertices -->
  <text x="150" y="18" fill="#92400e" font-weight="bold">A</text>
  <text x="286" y="135" fill="#92400e" font-weight="bold">B</text>
  <text x="150" y="252" fill="#92400e" font-weight="bold">C</text>
  <text x="22" y="135" fill="#92400e" font-weight="bold">D</text>
  <!-- Label O -->
  <text x="168" y="124" fill="#7c3aed" font-size="12">O</text>
  <!-- Mesures -->
  <text x="90" y="70" fill="#374151" font-size="12">côté = 10 cm</text>
  <text x="170" y="82" fill="#7c3aed" font-size="12">AC = 16 cm</text>
  <text x="108" y="120" fill="#7c3aed" font-size="12">BD = ?</text>
  <!-- Légende -->
  <text x="10" y="15" fill="#6b7280" font-size="11">Losange ABCD — diagonales perpendiculaires en O</text>
</svg>
